<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stack — pixart</title>
<link rel="stylesheet" href="../shared/chrome.css">
<link rel="stylesheet" href="../shared/gui.css">
<script src="../shared/theme.js"></script>
</head>
<body class="wa-effect">

<header class="wa-top">
  <div class="theme-switcher-container">
    <button class="theme-switcher-pill" aria-label="Cycle theme" title="Cycle theme">
      <span class="theme-switcher-pill-icon">●</span>
    </button>
  </div>
  <nav class="kami-breadcrumb">
    <a href="https://iamkesava.com">home</a><span class="sep">·</span>
    <a href="https://toys.iamkesava.com">toys</a><span class="sep">·</span>
    <span class="current">pixart</span>
  </nav>
  <div class="grow"></div>
  <nav class="effect-nav compact" aria-label="Effect navigation">
    <a class="effect-nav-arrow" href="../slit-scan/" title="Previous effect (slit-scan)" aria-label="Previous">‹</a>
    <a href="../" class="effect-nav-home" title="All effects">pixart</a>
    <span class="effect-nav-sep">/</span>
    <button type="button" class="effect-nav-current" id="effect-nav-open" aria-haspopup="dialog" aria-expanded="false" title="Browse all 28 effects">
      <span class="effect-nav-name">stack</span>
      <span class="effect-nav-chev">›</span>
    </button>
    <a class="effect-nav-arrow" href="../stippling/" title="Next effect (stippling)" aria-label="Next">›</a>
  </nav>
  <div class="wa-actions">
    <button id="help-btn" title="Keyboard shortcuts">keys</button>
    <button id="export-png" title="export png">png</button>
    <button id="export-mp4" title="record loopable video">video</button>
  </div>
</header>

<main class="wa-stage">
  <canvas id="cv"></canvas>
</main>

<aside class="wg" id="panel">
  <div class="wg-title" role="button" tabindex="0">Controls</div>
  <div class="wg-body">
    <!-- Shared source picker (image / video). -->
    <div class="wg-row wg-file" data-key="source" data-handler="pix-source">
      <div class="wg-name">Source</div>
      <div class="wg-widget">
        <label class="wg-file-label">click to choose</label>
        <button type="button" class="wg-file-open" title="Open file (image or video)">+</button>
        <button type="button" class="wg-shuffle" title="Cycle bundled sample">↻</button>
        <input type="file" accept="image/*,video/*">
      </div>
    </div>
    <div class="wg-row wg-select" data-key="fit">
      <div class="wg-name">Fit</div>
      <div class="wg-widget">
        <select><option value="cover">cover</option><option value="contain">contain</option></select>
      </div>
    </div>
    <div class="wg-row wg-color" data-key="bg">
      <div class="wg-name">Background</div>
      <div class="wg-widget"><div class="wg-swatch"><input type="color"></div><input type="text" spellcheck="false"></div>
    </div>
    <!-- Stack-specific control rows -->
    <div class="wg-row wg-slider" data-key="numCards"      data-min="1"   data-max="24"   data-step="1"><div class="wg-name">Cards</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="cardSize"      data-min="40"  data-max="500"  data-step="2"><div class="wg-name">Card size</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="cardRadius"    data-min="0"   data-max="250"  data-step="1"><div class="wg-name">Corner radius</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="rotationRange" data-min="0"   data-max="45"   data-step="1"><div class="wg-name">Rotation range</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="rotationSeed"  data-min="0"   data-max="1000" data-step="1"><div class="wg-name">Seed</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="cardShiftX"    data-min="0"   data-max="100"  data-step="1"><div class="wg-name">Shift X</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="cardShiftY"    data-min="0"   data-max="100"  data-step="1"><div class="wg-name">Shift Y</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="stackCycles"   data-min="1"   data-max="4"    data-step="1"><div class="wg-name">Cycles</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-select" data-key="easing"><div class="wg-name">Easing</div><div class="wg-widget"><select><option value="ease-out">faster</option><option value="linear">linear</option><option value="ease-in">slower</option></select></div></div>
    <div class="wg-row wg-select" data-key="mode">
      <div class="wg-name">Mode</div>
      <div class="wg-widget">
        <select>
          <option value="breath">breath</option>
          <option value="cascade">cascade</option>
          <option value="splay">splay</option>
          <option value="breath-3d">breath-3d</option>
          <option value="idle">idle</option>
        </select>
      </div>
    </div>
    <div class="wg-row wg-slider" data-key="shearAxis"  data-min="0"  data-max="360" data-step="5"><div class="wg-name">Shear axis</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="frameCount" data-min="1"  data-max="40"  data-step="1"><div class="wg-name">Frame count</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="focusRadius" data-min="0" data-max="600" data-step="10"><div class="wg-name">Focus radius</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-bool"   data-key="showShadow"><div class="wg-name">Shadow</div><label class="wg-widget"><input type="checkbox"></label></div>
    <div class="wg-row wg-bool"   data-key="tintCards"><div class="wg-name">Tint cards</div><label class="wg-widget"><input type="checkbox"></label></div>
    <div class="wg-row wg-bool"   data-key="showEffect"><div class="wg-name">Show effect</div><label class="wg-widget"><input type="checkbox"></label></div>
    <div class="wg-row wg-bool"   data-key="animate"><div class="wg-name">Animate</div><label class="wg-widget"><input type="checkbox"></label></div>
    <div class="wg-row wg-bool"   data-key="interactive"><div class="wg-name">Interactive</div><label class="wg-widget"><input type="checkbox"></label></div>
  </div>
</aside>

<div class="wa-rec" role="status"><span class="dot"></span><span class="label">Recording</span><div class="track"><div class="bar"></div></div></div>

<footer class="wa-bottom">
  <nav class="row sister" aria-label="Sister sites">
    <span><a href="https://apps.iamkesava.com/">apps</a></span><span class="sep">·</span>
    <span><a href="https://tools.iamkesava.com/">tools</a></span><span class="sep">·</span>
    <span class="current">toys</span><span class="sep">·</span>
    <span><a href="https://codex.iamkesava.com/">codex</a></span>
  </nav>
  <div class="row made">
    made by <a href="https://iamkesava.com" rel="author">kesava</a> <span class="sep">·</span> <a href="https://github.com/k3sava/pixart" rel="noopener">github</a>
  </div>
</footer>

<script src="../shared/state.js" defer></script>
<script src="../shared/keys.js" defer></script>
<script src="../shared/gui.js" defer></script>
<script src="../shared/export.js" defer></script>
<script src="effect.js" defer></script>
</body>
</html>
