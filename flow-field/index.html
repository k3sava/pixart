<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow field — pixart</title>
<link rel="stylesheet" href="../shared/chrome.css">
<link rel="stylesheet" href="../shared/gui.css">
<script src="../shared/theme.js"></script>
</head>
<body class="wa-effect">

<header class="wa-top">
  <div class="theme-switcher-container">
    <button class="theme-switcher-pill" aria-label="Cycle theme" title="Cycle theme">
      <span class="theme-switcher-pill-icon">●</span>
    </button>
  </div>
  <nav class="kami-breadcrumb">
    <a href="https://iamkesava.com">home</a><span class="sep">·</span>
    <a href="https://toys.iamkesava.com">toys</a><span class="sep">·</span>
    <a href="../" class="current">pixart</a>
  </nav>
  <div class="grow"></div>
  <nav class="effect-nav compact" aria-label="Effect navigation">
    <a class="effect-nav-arrow" href="../film-grain/" title="Previous effect (film-grain)" aria-label="Previous">‹</a>
    <button type="button" class="effect-nav-current" id="effect-nav-open" aria-haspopup="dialog" aria-expanded="false" title="Browse all 28 effects">
      <span class="effect-nav-name">flow-field</span>
      <span class="effect-nav-chev">›</span>
    </button>
    <a class="effect-nav-arrow" href="../gradients/" title="Next effect (gradients)" aria-label="Next">›</a>
  </nav>
  <div class="wa-actions">
    <button id="help-btn" title="Keyboard shortcuts">?</button>
    <button id="export-png" title="export png">png</button>
    <button id="export-mp4" title="record loopable video">mp4</button>
  </div>
</header>

<main class="wa-stage">
  <canvas id="cv"></canvas>
</main>

<aside class="wg" id="panel">
  <div class="wg-title" role="button" tabindex="0">Controls</div>
  <div class="wg-body">
    <div class="wg-row wg-toggle" data-key="showEffect"><div class="wg-name">Show effect</div><div class="wg-widget"><label class="wg-switch"><input type="checkbox"><span class="wg-switch-track"></span></label></div></div>
    <div class="wg-row wg-file" data-key="source" data-handler="pix-source">
      <div class="wg-name">Source</div>
      <div class="wg-widget">
        <label class="wg-file-label">click to choose</label>
        <button type="button" class="wg-file-open" title="Open file (image or video)">+</button>
        <button type="button" class="wg-shuffle" title="Cycle bundled sample">↻</button>
        <input type="file" accept="image/*,video/*">
      </div>
    </div>
    <div class="wg-row wg-select" data-key="fit">
      <div class="wg-name">Fit</div>
      <div class="wg-widget">
        <select><option value="cover">cover</option><option value="contain">contain</option></select>
      </div>
    </div>
    <div class="wg-row wg-select" data-key="ratio"><div class="wg-name">Ratio</div><div class="wg-widget"><select><option value="square">Square</option><option value="portrait">Portrait</option><option value="landscape">Landscape</option></select></div></div>
    <div class="wg-row wg-color" data-key="bg">
      <div class="wg-name">Background</div>
      <div class="wg-widget"><div class="wg-swatch"><input type="color"></div><input type="text" spellcheck="false"></div>
    </div>
    <div class="wg-row wg-select" data-key="colorMode">
      <div class="wg-name">Color mode</div>
      <div class="wg-widget">
        <select>
          <option value="sample">sample</option>
          <option value="gradient">gradient</option>
          <option value="mono">mono</option>
          <option value="complement">complement</option>
        </select>
      </div>
    </div>
    <div class="wg-row wg-slider" data-key="particles"   data-min="200" data-max="8000" data-step="100"><div class="wg-name">Particles</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="steps"       data-min="4" data-max="120" data-step="1"><div class="wg-name">Steps</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="stepLength"  data-min="0.5" data-max="6" data-step="0.1"><div class="wg-name">Step length</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="decimal"></div></div>
    <div class="wg-row wg-slider" data-key="noiseScale"  data-min="0.001" data-max="0.05" data-step="0.001"><div class="wg-name">Noise scale</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="decimal"></div></div>
    <div class="wg-row wg-slider" data-key="flowStrength" data-min="0" data-max="2" data-step="0.05"><div class="wg-name">Flow strength</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="decimal"></div></div>
    <div class="wg-row wg-slider" data-key="lineWidth"   data-min="0.3" data-max="3" data-step="0.1"><div class="wg-name">Line width</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="decimal"></div></div>
    <div class="wg-row wg-slider" data-key="alpha"       data-min="0" data-max="1" data-step="0.05"><div class="wg-name">Alpha</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="decimal"></div></div>
    <div class="wg-row wg-color"  data-key="inkColor"><div class="wg-name">Ink color</div><div class="wg-widget"><div class="wg-swatch"><input type="color"></div><input type="text" spellcheck="false"></div></div>
  </div>
</aside>

<div class="wa-rec" role="status"><span class="dot"></span><span class="label">Recording</span><div class="track"><div class="bar"></div></div></div>

<footer class="wa-bottom">
  <nav class="row sister" aria-label="Sister sites">
    <span><a href="https://apps.iamkesava.com/">apps</a></span><span class="sep">·</span>
    <span><a href="https://tools.iamkesava.com/">tools</a></span><span class="sep">·</span>
    <span class="current">toys</span><span class="sep">·</span>
    <span><a href="https://codex.iamkesava.com/">codex</a></span>
  </nav>
  <div class="row made">
    made by <a href="https://iamkesava.com" rel="author">kesava</a> <span class="sep">·</span> <a href="https://github.com/k3sava/pixart" rel="noopener">github</a>
  </div>
</footer>

<script src="../shared/state.js" defer></script>
<script src="../shared/keys.js" defer></script>
<script src="../shared/gui.js" defer></script>
<script src="../shared/export.js" defer></script>
<script src="effect.js" defer></script>
</body>
</html>
