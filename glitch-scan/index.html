<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Glitch Scan — pixart</title>
<link rel="stylesheet" href="../shared/chrome.css">
<link rel="stylesheet" href="../shared/gui.css">
<script src="../shared/theme.js"></script>
</head>
<body class="wa-effect">

<header class="wa-top">
  <div class="theme-switcher-container">
    <button class="theme-switcher-pill" aria-label="Cycle theme" title="Cycle theme">
      <span class="theme-switcher-pill-icon">●</span>
    </button>
  </div>
  <nav class="kami-breadcrumb">
    <a href="https://iamkesava.com">home</a><span class="sep">·</span>
    <a href="https://toys.iamkesava.com">toys</a><span class="sep">·</span>
    <a href="../" class="current">pixart</a>
  </nav>
  <div class="grow"></div>
  <nav class="effect-nav compact" aria-label="Effect navigation">
    <a class="effect-nav-arrow" href="../flow-warp/" title="Previous effect (flow-warp)" aria-label="Previous">‹</a>
    <button type="button" class="effect-nav-current" id="effect-nav-open" aria-haspopup="dialog" aria-expanded="false" title="Browse all 47 effects">
      <span class="effect-nav-name">glitch-scan</span>
      <span class="effect-nav-chev">›</span>
    </button>
    <a class="effect-nav-arrow" href="../gradients/" title="Next effect (gradients)" aria-label="Next">›</a>
  </nav>
  <div class="wa-actions">
    <button id="help-btn" title="Keyboard shortcuts">?</button>
    <button id="export-png" title="export png"><svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="3" width="11" height="8" rx="1"/><path d="M2.5 9.5 l3-2.5 2.5 2 2-1.5 3.5 2.5"/><circle cx="6" cy="6" r="1" fill="currentColor" stroke="none"/><path d="M8 12 v3 m0 0 l-1.5 -1.5 m1.5 1.5 l1.5 -1.5"/></svg></button>
    <button id="export-mp4" title="record loopable video"><svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="9.5" height="8" rx="1"/><path d="M11.5 6.5 l3 -1.5 v6 l-3 -1.5 z" fill="currentColor"/></svg></button>
  </div>
</header>

<main class="wa-stage">
  <canvas id="cv"></canvas>
</main>

<aside class="wg" id="panel">
  <div class="wg-body">
    <div class="wg-row wg-file" data-key="source" data-handler="pix-source">
      <div class="wg-name">Source</div>
      <div class="wg-widget">
        <label class="wg-file-label">click to choose</label>
        <button type="button" class="wg-file-open" title="Open file (image or video)">+</button>
        <button type="button" class="wg-shuffle" title="Cycle bundled sample">↻</button>
        <input type="file" accept="image/*,video/*">
      </div>
    </div>
    <div class="wg-row wg-select" data-key="fit">
      <div class="wg-name">Fit</div>
      <div class="wg-widget">
        <select><option value="cover">cover</option><option value="contain">contain</option></select>
      </div>
    </div>
    <div class="wg-row wg-select" data-key="ratio"><div class="wg-name">Ratio</div><div class="wg-widget"><select><option value="square">1:1</option><option value="portrait">9:16</option><option value="landscape">16:9</option></select></div></div>
    <div class="wg-row wg-color" data-key="bg">
      <div class="wg-name">Background</div>
      <div class="wg-widget"><div class="wg-swatch"><input type="color"></div><input type="text" spellcheck="false"></div>
    </div>
    <div class="wg-row wg-select" data-key="mode">
      <div class="wg-name">Mode</div>
      <div class="wg-widget">
        <select>
          <option value="burst">burst</option>
          <option value="drift">drift</option>
          <option value="storm">storm</option>
        </select>
      </div>
    </div>
    <div class="wg-row wg-bool"   data-key="animate"><div class="wg-name">Animate</div><label class="wg-widget"><input type="checkbox"></label></div>
    <div class="wg-row wg-bool"   data-key="interactive"><div class="wg-name">Cursor control</div><label class="wg-widget"><input type="checkbox"></label></div>
    <div class="wg-row wg-slider" data-key="intensity"  data-min="0"   data-max="100" data-step="1"><div class="wg-name">Intensity</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="scanLines"  data-min="0"   data-max="100" data-step="1"><div class="wg-name">Scan density</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="tears"      data-min="0"   data-max="10"  data-step="1"><div class="wg-name">Block tears</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="colorSplit" data-min="0"   data-max="100" data-step="1"><div class="wg-name">Color split</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-slider" data-key="speed"      data-min="0.5" data-max="4"   data-step="0.1"><div class="wg-name">Speed</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="decimal"></div></div>
    <div class="wg-row wg-slider" data-key="seed"       data-min="0"   data-max="999" data-step="1"><div class="wg-name">Seed</div><div class="wg-widget"><div class="wg-track"><div class="wg-fill"></div></div><input type="number" inputmode="numeric"></div></div>
    <div class="wg-row wg-bool"   data-key="showEffect"><div class="wg-name">Show effect</div><label class="wg-widget"><input type="checkbox"></label></div>
  </div>
  <div class="wg-credit">Inspired by <a href="https://synthymental.com/signal" target="_blank" rel="noopener">Signal by synthymental</a> and VHS head-switching <a href="https://en.wikipedia.org/wiki/Glitch_art" target="_blank" rel="noopener">glitch art</a></div>
</aside>

<div class="wa-rec" role="status"><span class="dot"></span><span class="label">Recording</span><div class="track"><div class="bar"></div></div></div>

<footer class="wa-bottom">
  <nav class="row sister" aria-label="Sister sites">
    <span><a href="https://apps.iamkesava.com/">apps</a></span><span class="sep">·</span>
    <span><a href="https://tools.iamkesava.com/">tools</a></span><span class="sep">·</span>
    <span class="current">toys</span><span class="sep">·</span>
    <span><a href="https://codex.iamkesava.com/">codex</a></span>
  </nav>
  <div class="row made">
    made by <a href="https://iamkesava.com" rel="author">kesava</a> <span class="sep">·</span> <a href="https://github.com/k3sava/pixart" rel="noopener">github</a>
  </div>
</footer>

<script src="../shared/state.js" defer></script>
<script src="../shared/keys.js" defer></script>
<script src="../shared/gui.js" defer></script>
<script src="../shared/export.js" defer></script>
<script src="effect.js" defer></script>
</body>
</html>
